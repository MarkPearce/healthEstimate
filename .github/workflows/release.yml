name: Release Module

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in module.json
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' src/module.json > src/module.tmp
          mv src/module.tmp src/module.json

      - name: Build zip
        run: |
          cd src
          zip -r ../healthEstimate.zip . -x ".DS_Store"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            healthEstimate.zip
            src/module.json
          generate_release_notes: true
